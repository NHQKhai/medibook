<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bài viết - MediBook</title>
<link rel="icon" href="images/logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="siteHeader"></div>

<div class="article-hero">
    <div class="container">
        <div class="breadcrumb"><a href="index.html">Trang chủ</a> / <a href="news.html">Tin tức</a> / Chi tiết bài viết</div>
    </div>
</div>

<section style="padding-top:30px">
    <div id="articleDetail"></div>

    <div class="container reveal" style="margin-top:40px">
        <div class="section-head left"><h2 style="font-size:24px">Bài viết liên quan</h2></div>
        <div class="article-grid" id="relatedGrid"></div>
    </div>
</section>

<div id="siteFooter"></div>
<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script src="js/app.js"></script>
<script>
mountLayout('news');
renderArticleDetail('articleDetail');
// Render 3 related articles (excluding current)
const id = parseInt(new URLSearchParams(location.search).get('id'),10) || 1;
const related = ARTICLES.filter(a => a.id !== id).slice(0,3);
const tmp = ARTICLES; window._save = tmp;
window.ARTICLES = related;
renderArticles('relatedGrid', 3);
window.ARTICLES = tmp;
initReveal();
</script>
</body>
</html>
