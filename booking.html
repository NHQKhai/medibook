<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Đặt lịch khám - MediBook</title>
<link rel="icon" href="images/logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="siteHeader"></div>

<div class="page-header">
    <div class="container">
        <h1>Đặt lịch khám</h1>
        <div class="breadcrumb"><a href="index.html">Trang chủ</a> / Đặt lịch</div>
    </div>
</div>

<section>
    <div class="container">
        <div class="booking-wrap">
            <form class="booking-form" id="bookingForm">
                <h2>Thông tin đặt lịch</h2>
                <div class="form-group">
                    <label>Bác sĩ <span style="color:red">*</span></label>
                    <select id="fDoctor" required></select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Ngày khám <span style="color:red">*</span></label>
                        <input type="date" id="fDate" required>
                    </div>
                    <div class="form-group">
                        <label>Hình thức khám</label>
                        <select>
                            <option>Khám trực tiếp tại bệnh viện</option>
                            <option>Khám trực tuyến (video call)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Khung giờ khám <span style="color:red">*</span></label>
                    <div class="time-slots" id="slots"></div>
                </div>

                <h2 style="margin-top:30px">Thông tin bệnh nhân</h2>
                <div class="form-row">
                    <div class="form-group"><label>Họ và tên <span style="color:red">*</span></label><input type="text" required placeholder="Nguyễn Văn A"></div>
                    <div class="form-group"><label>Số điện thoại <span style="color:red">*</span></label><input type="tel" required placeholder="0901234567"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Email</label><input type="email" placeholder="email@example.com"></div>
                    <div class="form-group"><label>Năm sinh</label><input type="number" placeholder="1990" min="1900" max="2026"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Giới tính</label><select><option>Nam</option><option>Nữ</option><option>Khác</option></select></div>
                    <div class="form-group"><label>Đối tượng</label><select><option>Người lớn</option><option>Trẻ em</option><option>Người cao tuổi</option></select></div>
                </div>
                <div class="form-group"><label>Lý do khám / Triệu chứng</label><textarea rows="4" placeholder="Mô tả ngắn về tình trạng sức khỏe..."></textarea></div>
                <button type="submit" class="btn btn-primary btn-lg btn-block" onclick="event.preventDefault();window.location='payment.html'">Xác nhận đặt lịch &amp; thanh toán →</button>
            </form>

            <aside class="booking-summary">
                <h3>Thông tin lịch hẹn</h3>
                <div style="display:flex;gap:12px;margin-bottom:16px;align-items:center">
                    <img id="sumImg" src="images/doctors/doctor1.png" style="width:64px;height:64px;border-radius:50%;object-fit:cover">
                    <div>
                        <strong id="sumDoctor" style="display:block;color:#0e7c5b">BS. Nguyễn Văn A</strong>
                        <span id="sumSpec" style="font-size:13px;color:#00a85a">Chuyên khoa</span>
                    </div>
                </div>
                <div class="summary-row"><span class="label">Bệnh viện</span><span id="sumHospital">-</span></div>
                <div class="summary-row"><span class="label">Ngày khám</span><span id="sumDate">-</span></div>
                <div class="summary-row"><span class="label">Giờ khám</span><span id="sumTime">Chưa chọn</span></div>
                <div class="summary-row" style="border-top:1px solid #e2e8f0;margin-top:10px;padding-top:14px">
                    <span class="label">Phí khám</span>
                    <strong id="sumFee" style="color:#00a85a;font-size:18px">-</strong>
                </div>
                <p style="font-size:12px;color:#718096;margin-top:14px;line-height:1.5">
                    Sau khi đặt lịch, MediBook sẽ gửi thông tin xác nhận tới email và số điện thoại của bạn trong vòng 5 phút.
                </p>
            </aside>
        </div>
    </div>
</section>

<div id="siteFooter"></div>
<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script src="js/app.js"></script>
<script>mountLayout('');initBooking();initReveal();</script>
</body>
</html>
