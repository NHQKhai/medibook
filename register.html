<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Đăng ký - MediBook</title>
<link rel="icon" href="images/logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="siteHeader"></div>

<section style="background:linear-gradient(135deg,#e8f7ef,#d4f1e1);min-height:70vh;padding:40px 0">
    <div class="container">
        <div class="auth-wrap" style="max-width:560px">
            <h1>Đăng ký tài khoản</h1>
            <p class="sub">Tham gia MediBook để trải nghiệm dịch vụ đặt lịch y tế tốt nhất</p>
            <div class="role-tabs">
                <button type="button" class="active" data-role="patient">Bệnh nhân</button>
                <button type="button" data-role="doctor">Bác sĩ</button>
                <button type="button" data-role="student">HSSV</button>
            </div>
            <form onsubmit="event.preventDefault();alert('Đăng ký thành công! Vui lòng đăng nhập.');window.location='login.html'">
                <div class="form-row">
                    <div class="form-group"><label>Họ <span style="color:red">*</span></label><input type="text" required placeholder="Nguyễn"></div>
                    <div class="form-group"><label>Tên <span style="color:red">*</span></label><input type="text" required placeholder="Văn A"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Số điện thoại <span style="color:red">*</span></label><input type="tel" required placeholder="0901234567"></div>
                    <div class="form-group"><label>Email <span style="color:red">*</span></label><input type="email" required placeholder="email@example.com"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Mật khẩu <span style="color:red">*</span></label><input type="password" required placeholder="Tối thiểu 8 ký tự" minlength="8"></div>
                    <div class="form-group"><label>Nhập lại mật khẩu <span style="color:red">*</span></label><input type="password" required placeholder="••••••••"></div>
                </div>
                <div class="form-group">
                    <label style="display:flex;align-items:center;gap:8px;font-weight:400;font-size:13px">
                        <input type="checkbox" required>
                        Tôi đồng ý với <a href="terms.html" style="color:var(--primary)">Điều khoản sử dụng</a> và <a href="privacy.html" style="color:var(--primary)">Chính sách bảo mật</a>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg">Đăng ký ngay</button>
            </form>
            <div style="text-align:center;margin:20px 0;color:#aaa;font-size:13px;position:relative">
                <span style="background:#fff;padding:0 12px;position:relative;z-index:1">hoặc đăng ký bằng</span>
                <div style="position:absolute;top:50%;left:0;right:0;height:1px;background:#e2e8f0"></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                <button type="button" class="btn btn-outline" onclick="alert('Đăng ký qua Google (demo)')">Google</button>
                <button type="button" class="btn btn-outline" onclick="alert('Đăng ký qua Facebook (demo)')">Facebook</button>
            </div>
            <div class="auth-foot">
                Đã có tài khoản? <a href="login.html">Đăng nhập</a>
            </div>
        </div>
    </div>
</section>

<div id="siteFooter"></div>
<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script src="js/app.js"></script>
<script>
mountLayout('');
document.querySelectorAll('.role-tabs button').forEach(b => {
    b.addEventListener('click', () => {
        document.querySelectorAll('.role-tabs button').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
    });
});
</script>
</body>
</html>
